# 디버그 콘솔 오버레이 — `-DDEBUG_CONSOLE=y` 일 때만 적용된다(CMakeLists.txt).
#
# 이 파일이 prj.conf 와 분리된 이유(실측 근거):
#   배터리 idle 전류 1.13mA → 80.9µA (14배). 차이는 전부 UARTE 였다.
#   nRF52840 UARTE 는 RX 활성 상태에서 HFCLK 를 계속 잡아 ~1mA 를 먹는다.
#   C 코드만 빼는 것(_USE_HW_DEBUG_CONSOLE)으로는 부족하다 — 그때는 1.21→1.13mA 로
#   거의 변화가 없었다. Zephyr 콘솔 스택이 Kconfig 로 여전히 빌드·초기화되기 때문.
#   즉 콘솔 제거는 반드시 C(_USE_HW_*)와 Kconfig(CONFIG_SERIAL) 양쪽이어야 한다.
#   런타임 게이팅(PM suspend)도 시도했으나 오히려 악화됐다(1.21→1.98mA).

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETCHAR=y
CONFIG_CONSOLE_GETCHAR_BUFSIZE=64
CONFIG_CONSOLE_PUTCHAR_BUFSIZE=512

CONFIG_LOG=y
