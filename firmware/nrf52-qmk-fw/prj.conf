# [저전력] 콘솔/시리얼(CONFIG_SERIAL 등)은 여기 없다 — debug.conf 로 분리했다.
# UARTE 는 RX 활성 시 HFCLK 를 잡아 ~1mA 를 먹는다(실측 1.13mA vs 80.9µA).
# 개발 시에만: west build ... -- -DDEBUG_CONSOLE=y

CONFIG_GPIO=y

# 배터리 잔량 — nRF VDDH 내장 ADC (외부 부품 0). driver/battery.c
# 나중에 MAX17048 로 확장 시: CONFIG_FUEL_GAUGE=y + CONFIG_MAX17048=y + CONFIG_I2C=y
CONFIG_ADC=y

CONFIG_MAIN_STACK_SIZE=8192
CONFIG_MULTITHREADING=y

# USB HID
#
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_USBD_HID_SUPPORT=y
CONFIG_ENABLE_HID_INT_OUT_EP=y

CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_USBD_HID_LOG_LEVEL_WRN=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y

CONFIG_INPUT=y
CONFIG_INPUT_MODE_SYNCHRONOUS=y

# 키 매트릭스: Zephyr 네이티브 gpio-kbd-matrix (DTS: kbd_matrix).
# idle 시 인터럽트 대기로 CPU sleep (저전력). 디바운스는 QMK 가 담당(드라이버 0).
CONFIG_INPUT_GPIO_KBD_MATRIX=y
# 입력 라인 15개(wish60 col) → 8비트 기본으론 8개 한도라 16비트 row 타입 필요
CONFIG_INPUT_KBD_MATRIX_16_BIT_ROW=y

# 부트로더는 보드에 미리 플래시된 UF2 부트로더(wish60/Adafruit) 사용.
# 앱을 code_partition(0x1000) 오프셋에 맞춰 빌드하고 .uf2 산출물 생성.
CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_BUILD_OUTPUT_UF2=y

# bootloader_jump()/mcu_reset() 에서 sys_reboot() 사용
CONFIG_REBOOT=y

# deep sleep: sys_poweroff() = nRF52 System OFF (port/activity.c)
# 웨이크업은 GPIO DETECT 로만 — board DTS 의 sense-edge-mask 가 전제다.
CONFIG_POWEROFF=y

# QMK 키맵 영속화: 플래시 에뮬레이션 EEPROM (eeprom0 노드)
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_EEPROM=y
CONFIG_EEPROM_EMULATOR=y

# BLE (Phase 5) — NCS 의 HID over GATT 서비스(BT_HIDS) 사용.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="WISH60"
# 961 = HID Keyboard
CONFIG_BT_DEVICE_APPEARANCE=961
# 페어링/본딩 (HID over GATT 는 암호화 필수)
CONFIG_BT_SMP=y
CONFIG_BT_MAX_CONN=1
# BLE 프로파일(호스트 전환용) 5개 = 본딩 5개. ZMK 기본값(ZMK_BLE_PROFILE_COUNT)과 동일.
# 프로파일 선택/광고 전환 로직은 앱 레벨(port/ble.c)에서 구현한다(ZMK app/src/ble.c 패턴).
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_HIDS=y
CONFIG_BT_HIDS_MAX_CLIENT_COUNT=1
CONFIG_BT_HIDS_DEFAULT_PERM_RW_ENCRYPT=y
CONFIG_BT_CONN_CTX=y
CONFIG_BT_GATT_AUTO_SEC_REQ=n
CONFIG_BT_ATT_TX_COUNT=5
CONFIG_BT_GATT_UUID16_POOL_SIZE=40
CONFIG_BT_GATT_CHRC_POOL_SIZE=20
# 배터리 서비스 (Phase 6 에서 값 공급)
CONFIG_BT_BAS=y
CONFIG_BT_DIS=y

# BLE 연결 파라미터 — 무선 전력의 핵심. ZMK 기본값과 동일하게 맞춘다.
# 단위 1.25ms → 연결 간격 7.5~15ms
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
# slave latency: 보낼 게 없으면 연결 이벤트를 최대 30개 건너뛴다.
# → idle 시 15ms*(30+1) ≈ 465ms 마다만 라디오 wakeup (기본값 0 이면 매 간격마다 깨어남).
# 키 입력 시엔 즉시 전송되므로 체감 지연 없음.
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
# supervision timeout 4s (latency*interval 보다 충분히 커야 연결이 안 끊긴다)
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# bond/설정 영속화 (storage_partition = 0xdc000, emu-eeprom 파티션과 별개)
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_BT_SETTINGS=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048