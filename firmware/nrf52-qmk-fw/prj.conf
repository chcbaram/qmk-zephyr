CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETCHAR=y
CONFIG_CONSOLE_GETCHAR_BUFSIZE=64
CONFIG_CONSOLE_PUTCHAR_BUFSIZE=512

CONFIG_LOG=y

CONFIG_GPIO=y

CONFIG_MAIN_STACK_SIZE=8192
CONFIG_MULTITHREADING=y

# USB HID
#
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_USBD_HID_SUPPORT=y
CONFIG_ENABLE_HID_INT_OUT_EP=y

CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_USBD_HID_LOG_LEVEL_WRN=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y

CONFIG_INPUT=y
CONFIG_INPUT_MODE_SYNCHRONOUS=y

# 키 매트릭스: Zephyr 네이티브 gpio-kbd-matrix (DTS: kbd_matrix).
# idle 시 인터럽트 대기로 CPU sleep (저전력). 디바운스는 QMK 가 담당(드라이버 0).
CONFIG_INPUT_GPIO_KBD_MATRIX=y
# 입력 라인 15개(wish60 col) → 8비트 기본으론 8개 한도라 16비트 row 타입 필요
CONFIG_INPUT_KBD_MATRIX_16_BIT_ROW=y

# 부트로더는 보드에 미리 플래시된 UF2 부트로더(wish60/Adafruit) 사용.
# 앱을 code_partition(0x1000) 오프셋에 맞춰 빌드하고 .uf2 산출물 생성.
CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_BUILD_OUTPUT_UF2=y

# bootloader_jump()/mcu_reset() 에서 sys_reboot() 사용
CONFIG_REBOOT=y

# QMK 키맵 영속화: 플래시 에뮬레이션 EEPROM (eeprom0 노드)
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_EEPROM=y
CONFIG_EEPROM_EMULATOR=y